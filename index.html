<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitCouple 💪</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a3a;
  --accent:#6c63ff;--pink:#ff6584;--green:#00d4aa;--yellow:#ffd166;
  --text:#f0f0f5;--muted:#7a7a9a;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative}

/* ── HEADER ── */
#header{padding:52px 16px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.user-toggle{display:flex;gap:6px;background:var(--surface2);border-radius:12px;padding:4px}
.utb{flex:1;padding:9px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.utb.ab{background:var(--accent);color:#fff}
.utb.ad{background:var(--pink);color:#fff}

/* ── NAV ── */
#nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;transition:color .2s}
.nb.on{color:var(--accent)}
.nb svg{width:22px;height:22px}

/* ── PAGES ── */
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px 20px;display:none;animation:fi .25s ease}
.page.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.ca{border-color:var(--accent)!important;background:linear-gradient(135deg,rgba(108,99,255,.08),var(--surface))}
.cg{border-color:var(--green)!important;background:linear-gradient(135deg,rgba(0,212,170,.07),var(--surface))}
.cp{border-color:var(--pink)!important;background:linear-gradient(135deg,rgba(255,101,132,.07),var(--surface))}

/* ── TYPOGRAPHY ── */
h1{font-size:22px;font-weight:800;margin-bottom:2px}
h2{font-size:16px;font-weight:700;margin-bottom:10px}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.muted{color:var(--muted);font-size:13px}
.ph{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));color:#fff;display:inline-block;margin-bottom:10px}

/* ── TAGS ── */
.tag{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.tp{background:rgba(108,99,255,.2);color:var(--accent)}
.tg{background:rgba(0,212,170,.2);color:var(--green)}
.ty{background:rgba(255,209,102,.2);color:var(--yellow)}
.tk{background:rgba(255,101,132,.2);color:var(--pink)}
.tm{background:rgba(122,122,154,.15);color:var(--muted)}

/* ── RING SVG ── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-inner{position:absolute;text-align:center;pointer-events:none}

/* ── STAT GRID ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--surface2);border-radius:12px;padding:14px}
.big{font-size:28px;font-weight:900}

/* ── MACRO BAR ── */
.mbg{background:var(--surface2);border-radius:4px;height:7px;overflow:hidden;margin-top:4px}
.mbf{height:100%;border-radius:4px;transition:width .5s}

/* ── DAY CARDS ── */
.dc{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.dc:hover,.dc.today{border-color:var(--accent)}
.dc.rest{border-color:var(--green)}
.dc-body{display:none;padding-top:12px;border-top:1px solid var(--border);margin-top:10px}
.dc-body.open{display:block}

/* ── EXERCISE ITEMS ── */
.ex-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border:none}
.exn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px}

/* ── LOG ── */
.set-tbl{width:100%;border-collapse:collapse;margin-bottom:8px}
.set-tbl th{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;padding:4px 6px;text-align:center}
.set-tbl td{padding:5px 6px;text-align:center}
.si{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;font-weight:600;padding:7px 8px;width:72px;text-align:center}
.si:focus{outline:none;border-color:var(--accent)}

/* ── BUTTONS ── */
.btn{padding:12px 20px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;width:100%;transition:all .2s}
.bp{color:#fff}
.bo{background:transparent;border:1px solid var(--border);color:var(--text)}
.bsm{padding:6px 10px;font-size:12px;border-radius:8px;width:auto}
.brd{background:rgba(255,101,132,.15);color:var(--pink);border:1px solid var(--pink)}
.bgo{background:rgba(0,212,170,.15);color:var(--green);border:1px solid var(--green)}

/* ── PROGRESS BAR ── */
.pb-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── INPUT ── */
.inp{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:10px 12px;width:100%;margin-bottom:8px}
.inp:focus{outline:none;border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── COMPARE ── */
.cbar{display:flex;align-items:center;gap:8px;margin:5px 0}
.clbl{width:52px;font-size:12px;color:var(--muted)}
.cbw{flex:1;background:var(--surface2);border-radius:4px;height:8px;overflow:hidden}
.cbf{height:100%;border-radius:4px}

/* ── COUPLE CARDS ── */
.cc2{display:flex;gap:10px;margin-bottom:12px}
.cc2 .ccu{flex:1;background:var(--surface2);border-radius:12px;padding:12px}

/* ── TIP BOX ── */
.tipbox{font-size:11px;color:var(--green);padding:6px 10px;background:rgba(0,212,170,.08);border-radius:8px;margin-bottom:10px;line-height:1.5}

/* ── CHECK ── */
.ck{width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── CHART ── */
.chart-svg{width:100%;overflow:visible}

/* ── QUICK MEAL GRID ── */
.qg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.qb{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;text-align:left;color:var(--text);transition:border-color .2s;font-family:inherit}
.qb:hover{border-color:var(--accent)}

#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--green);color:var(--text);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .3s;z-index:100;max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#offline-badge{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:var(--pink);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;z-index:101;display:none}
#offline-badge.show{display:block}

input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>

<script src="firebase-config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, collection, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const app = initializeApp(window.FC_FIREBASE_CONFIG);
  const db = getFirestore(app);
  const usersCol = collection(db, 'fitcouple');

  window.FCDB = {
    subscribe(callback) {
      onSnapshot(usersCol, snap => {
        const logs = {}, weights = {}, nutrition = {};
        snap.forEach(docSnap => {
          const uid = docSnap.id;
          const data = docSnap.data();
          logs[uid] = data.logs || [];
          weights[uid] = data.weights || [];
          nutrition[uid] = data.nutrition || [];
        });
        callback({ logs, weights, nutrition });
      });
    },
    update(user, field, value) {
      return setDoc(doc(db, 'fitcouple', user), { [field]: value }, { merge: true });
    }
  };
</script>

// Day index → program index (Sun=6=Rest, Mon=0, Tue=1, ...)
const DAYPROG = [6,0,1,2,3,4,5];

let currentUser = ls('fc_user') || 'bright';
let currentTab  = 'home';
let logState    = {}; // per-session workout log state

function ls(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null }catch{return null} }
function ss(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)) }catch{} }
let cloudState = { logs:{}, weights:{}, nutrition:{} };
function getLogs(){ return cloudState.logs }
function getWeights(){ return cloudState.weights }
function getNutrition(){ return cloudState.nutrition }
function today(){ return new Date().toDateString() }
function todayPlanIdx(){ return DAYPROG[new Date().getDay()] }

// ── UTILS ─────────────────────────────────────────────────────────────────────
function el(id){ return document.getElementById(id) }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function showToast(msg){
  const t=el('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer=setTimeout(()=>t.classList.remove('show'),3500);
}
function updateOfflineBadge(){
  el('offline-badge').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOfflineBadge);
window.addEventListener('offline', updateOfflineBadge);

let handoffProcessed=false;
function handleIncomingHandoff(){
  if(handoffProcessed) return;
  const result=parseHandoffParams(location.search, Object.keys(USERS));
  if(!result) return;
  handoffProcessed=true;
  if(result.type==='workout'){
    const updated=mergeHealthSync(cloudState.logs, result.user, today(), {kcal:result.kcal,duration:result.duration,avgHR:result.avgHR});
    cloudState.logs={...cloudState.logs,[result.user]:updated};
    window.FCDB.update(result.user, 'logs', updated).catch(err=>{
      console.error('Sync failed', err);
      showToast('⚠️ Sync failed — will retry when online');
    });
    showToast(`✅ Synced from Apple Watch: ${result.kcal} kcal · ${result.duration} min`);
  } else if(result.type==='weight'){
    const updated=mergeWeightEntry(cloudState.weights, result.user, today(), result.weightKg);
    cloudState.weights={...cloudState.weights,[result.user]:updated};
    window.FCDB.update(result.user, 'weights', updated).catch(err=>{
      console.error('Sync failed', err);
      showToast('⚠️ Sync failed — will retry when online');
    });
    showToast(`✅ Weight logged: ${result.weightKg}kg`);
  }
  history.replaceState({}, '', location.pathname);
  renderTab(currentTab);
}
function ring(val,max,size,stroke,color){
  const r=(size-stroke)/2, circ=2*Math.PI*r, pct=Math.min(val/max,1);
  const off=circ*(1-pct);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1c1c26" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/>
  </svg>`;
}
function macroBar(val,max,color){
  const pct=Math.min(Math.round((val/max)*100),100);
  return `<div class="mbg"><div class="mbf" style="width:${pct}%;background:${color}"></div></div>`;
}
function progressBar(val,max,color){
  const pct=Math.min(Math.round((val/max)*100),100);
  return `<div class="pb-wrap"><div class="pb-fill" style="width:${pct}%;background:${color}"></div></div>`;
}

function getUserNutritionToday(uid){
  const nutr=getNutrition();
  return (nutr[uid]||[]).find(n=>n.date===today()) || {kcal:0,protein:0,carbs:0,fat:0,meals:[]};
}
function getStreak(uid){
  const logs=getLogs()[uid]||[];
  const now=new Date();
  return logs.filter(l=>{ const d=new Date(l.date); return Math.floor((now-d)/86400000)<=7 && l.exercises?.length>0 }).length;
}

function switchUser(uid){

  el('btn-drishti').className='utb'+(uid==='drishti'?' ad':'');

  document.documentElement.style.setProperty('--accent', USERS[uid].color);
  renderTab(currentTab);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function goTab(tab){
  currentTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  el('page-'+tab).classList.add('on');
  const tabs=['home','plan','log','progress','nutrition','apple'];
  document.querySelectorAll('.nb')[tabs.indexOf(tab)].classList.add('on');
  renderTab(tab);
}
function renderTab(tab){
  if(tab==='home')      renderHome();
  if(tab==='plan')      renderPlan();
  if(tab==='log')       renderLog();

function toggleLogEx(i){
  const u=currentUser, key='fc_logstate_'+u+'_'+today();
  logState[key][i].open=!logState[key][i].open;
  renderLog();
}
function markDone(i){
  const key='fc_logstate_'+currentUser+'_'+today();
  logState[key][i].done=!logState[key][i].done;
  renderLog();
}
function updateSet(exIdx,setIdx,field,val){
  const key='fc_logstate_'+currentUser+'_'+today();
  logState[key][exIdx].sets[setIdx][field]=val;
}
function addSet(exIdx){
  const key='fc_logstate_'+currentUser+'_'+today();
  logState[key][exIdx].sets.push({reps:'',weight:''});
  renderLog();
}
function removeSet(exIdx,setIdx){
  const key='fc_logstate_'+currentUser+'_'+today();
  logState[key][exIdx].sets.splice(setIdx,1);
  renderLog();
}
function saveWorkout(){
  const key='fc_logstate_'+currentUser+'_'+today();
  const exs=logState[key];
  const logs=getLogs();
  const existing=(logs[currentUser]||[]).find(l=>l.date===today());
  const entry={date:today(),programIdx:todayPlanIdx(),exercises:exs,savedAt:new Date().toISOString(),
    ...(existing?.healthSync?{healthSync:existing.healthSync}:{})};
  const userLogs=(logs[currentUser]||[]).filter(l=>l.date!==today());
  const updated=[...userLogs,entry];
  cloudState.logs={...cloudState.logs,[currentUser]:updated};
  window.FCDB.update(currentUser, 'logs', updated).catch(err=>{
    console.error('Sync failed', err);
    showToast('⚠️ Sync failed — will retry when online');
  });
  renderLog();
}

      return `${x},${y}`;

    chartSvg=`<div class="card">

          const y=H-10-((v-mn)/(mx-mn))*(H-20);
          return `<circle cx="${x}" cy="${y}" r="4" fill="${u.color}"/><text x="${x}" y="${y-8}" text-anchor="middle" font-size="9" fill="var(--muted)">${v}</text>`;
        }).join('')}
        <text x="20" y="${H}" text-anchor="middle" font-size="9" fill="var(--muted)">Start</text>
        <text x="${W-20}" y="${H}" text-anchor="end" font-size="9" fill="var(--muted)">Now</text>
      </svg>
    </div>`;
  }

  el('page-progress').innerHTML=`

  <div class="muted" style="margin-bottom:14px">Track your transformation</div>

  <div class="sg">

function logWeight(){
  const inp=el('wt-inp');
  const w=parseFloat(inp.value);
  if(!w||w<30||w>250){inp.style.borderColor='var(--pink)';return}
  inp.style.borderColor='';
  const updated=mergeWeightEntry(getWeights(), currentUser, today(), w);
  cloudState.weights={...cloudState.weights,[currentUser]:updated};
  window.FCDB.update(currentUser, 'weights', updated).catch(err=>{
    console.error('Sync failed', err);
    showToast('⚠️ Sync failed — will retry when online');
  });
  inp.value='';
  renderProgress();
}

function toggleCustomForm(){
  const f=el('custom-form');
  f.style.display=f.style.display==='none'?'block':'none';
}

function addNutritionEntry(meal){
  const nutr=getNutrition();
  const userN=(nutr[currentUser]||[]).slice();
  const idx=userN.findIndex(n=>n.date===today());
  if(idx>=0){
    userN[idx]={...userN[idx],
      kcal:(userN[idx].kcal||0)+meal.kcal,
      protein:(userN[idx].protein||0)+meal.p,
      carbs:(userN[idx].carbs||0)+meal.c,
      fat:(userN[idx].fat||0)+meal.f,
      meals:[...(userN[idx].meals||[]),meal]
    };
  } else {
    userN.push({date:today(),kcal:meal.kcal,protein:meal.p,carbs:meal.c,fat:meal.f,meals:[meal]});
  }
  cloudState.nutrition={...cloudState.nutrition,[currentUser]:userN};
  window.FCDB.update(currentUser, 'nutrition', userN).catch(err=>{
    console.error('Sync failed', err);
    showToast('⚠️ Sync failed — will retry when online');
  });
  renderNutrition();
  if(currentTab==='home') renderHome();
}

function quickAddMeal(i){
  addNutritionEntry(QUICK_MEALS[i]);
}

function addCustomMeal(){
  const n=el('mn')?.value?.trim();
  const kcal=parseInt(el('mc')?.value)||0;
  const p=parseInt(el('mp')?.value)||0;
  const c=parseInt(el('mca')?.value)||0;
  const f=parseInt(el('mf')?.value)||0;
  if(!n||!kcal) return;
  addNutritionEntry({n,kcal,p,c,f});
}
